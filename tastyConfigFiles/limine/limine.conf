### =========================================================
### LIMINE BOOTLOADER CONFIG — Arch Linux + Windows dual boot
### Place this file at: /boot/limine/limine.conf
### =========================================================

### ---------- Global / misc options ---------- ###

timeout: 5
# Seconds the menu waits before auto-booting the default entry.
# "no" = wait forever (no auto-boot). "0" = boot default entry instantly.

default_entry: 1
# Entry that boots automatically when the timeout expires.
# 1 = first entry below. Could also be a name, e.g. "Arch Linux".

remember_last_entry: yes
# If yes, next boot pre-selects whatever you booted last time,
# instead of always resetting to default_entry.

quiet: no
# no = normal menu output. yes = suppress all output except panics/warnings.

verbose: no
# If yes, print extra diagnostic info during Limine's own boot process.

graphics: yes
# Use a graphical video mode for the menu (needed for wallpapers/branding).
# "no" forces plain text mode.

randomise_memory: no
# If yes, randomises RAM contents at boot to help find bugs relying on
# zeroed memory. Slows boot down noticeably — leave "no" unless debugging.

hash_mismatch_panic: yes
# If a file's hash doesn't match what's expected, panic instead of just
# warning. Irrelevant unless you're using Secure Boot hash enrollment.
# (Secure Boot forces this to "yes" automatically regardless of this setting.)


### ---------- Interface look & feel ---------- ###

interface_branding: Arch Linux / Windows Boot Menu
# Text shown at the top of the boot menu. Purely cosmetic — set to
# whatever you like, or delete the line to show nothing.

interface_branding_colour: 00aaaa
# Colour (hex RRGGBB) of the branding text above. Default is teal (00aaaa).
# Try e.g. ff5f1f (orange) or 7f00ff (purple) — no leading '#'.

#interface_resolution: 1920x1080
# Resolution used by the Limine menu/editor itself (NOT what your OS uses
# once booted). Comment out this line to let Limine auto-pick a resolution.
# If the value you set isn't supported, Limine silently picks another one.

interface_rotation: 0
# Rotate the Limine interface: 0, 90, 180, or 270 degrees. Leave at 0
# unless your screen is physically mounted sideways/upside down.

interface_help_hidden: no
# If yes, hides the key-binding help text shown at the top of the screen.

interface_help_colour: 00aa00
# Colour of that help text. Default green (00aa00).


### ---------- Wallpaper ---------- ###

wallpaper: boot():/limine/wallpaper.jpg
# Path to the background image for the menu. BMP, PNG, and JPEG are
# supported. Put the file at /boot/limine/wallpaper.jpg (or .png/.bmp)
# and update this path/extension to match.
# You can list this line MULTIPLE times with different images — Limine
# will pick one at random each boot, e.g.:
#   wallpaper: boot():/limine/wallpaper1.jpg
#   wallpaper: boot():/limine/wallpaper2.jpg

wallpaper_style: stretched
# How the wallpaper is displayed. Options:
#   stretched - fills the whole screen, may distort aspect ratio (default)
#   centered  - shown at native size, centered, rest of screen is "backdrop"
#   tiled     - repeats the image to fill the screen

backdrop: 000000
# Colour (hex RRGGBB) used to fill empty space when wallpaper_style is
# "centered" and the image doesn't cover the full screen. Default black.


### ---------- Terminal / text colours (menu console) ---------- ###
### These only affect Limine's own text output, never your OS once booted.

term_palette: 000000;aa0000;00aa00;aa5500;0000aa;aa00aa;00aaaa;aaaaaa
# Normal 8-colour palette (RRGGBB;RRGGBB;...): black;red;green;brown;
# blue;magenta;cyan;grey — in that fixed order.

term_palette_bright: 555555;ff5555;55ff55;ffff55;5555ff;ff55ff;55ffff;ffffff
# Bright/bold version of the same 8 colours, same order.

term_background: 00000000
# Terminal background colour in TTRRGGBB (TT = transparency). Default
# fully transparent black — shows the wallpaper behind the text.

term_foreground: ffffff
# Terminal text colour (RRGGBB). Default white.

term_margin: 64
# Margin in pixels around the terminal text area.

term_margin_gradient: 8
# Pixel thickness of the fade/gradient effect at the terminal's edges.


### ---------- Editor ---------- ###

editor_enabled: yes
# Lets you press 'e' on a highlighted entry to edit its kernel cmdline
# for one boot only (e.g. add "single"), without touching this file.
# Automatically forced to "no" if Secure Boot is active.

editor_highlighting: yes
# Syntax highlighting inside the editor. Purely cosmetic.

editor_validation: yes
# Warns you in the editor if you type an invalid option or bad syntax.


### =========================================================
### BOOT ENTRIES
### =========================================================

/Arch Linux
    protocol: linux
    # Native Linux kernel boot — no chainloading, fastest path.

    path: boot():/vmlinuz-linux
    # The kernel image. boot() = the same partition this config file is on
    # (your ESP, assuming it's mounted directly at /boot, as is standard
    # on Arch). If your kernel instead sits under /boot/efi, adjust paths
    # to be relative to that ESP's root instead.

    cmdline: root=UUID=REPLACE-WITH-YOUR-ROOT-UUID rw quiet splash
    # root=UUID=... tells the kernel which partition is /.
    # Get the real UUID with: blkid /dev/yourRootPartition
    # rw = mount root read-write. quiet/splash hide the verbose boot log.

    module_path: boot():/intel-ucode.img
    # CPU microcode update, loaded before the initramfs. Swap for
    # /amd-ucode.img if you have an AMD CPU. Order of module_path lines
    # matters — ucode must come first.

    module_path: boot():/initramfs-linux.img
    # Your initramfs, built by mkinitcpio.


/Arch Linux (fallback)
    protocol: linux
    path: boot():/vmlinuz-linux
    cmdline: root=UUID=REPLACE-WITH-YOUR-ROOT-UUID rw
    module_path: boot():/intel-ucode.img
    module_path: boot():/initramfs-linux-fallback.img
    # Fallback initramfs bundles nearly every driver — use this entry if
    # a kernel/driver update leaves the main entry unable to boot.


/Windows
    protocol: efi_chainload
    # Hands control to another EFI application (Windows' own boot
    # manager) instead of booting a kernel directly. "efi_chainload" and
    # "efi" are aliases of the same protocol.

    path: boot():/EFI/Microsoft/Boot/bootmgfw.efi
    # Path to the Windows Boot Manager. This assumes Windows and Arch
    # share the SAME EFI System Partition (typical single-disk dual-boot).
    #
    # If Windows has its OWN separate ESP on a different drive, boot()
    # won't reach it — use the guid() resource instead, pointing at that
    # ESP's filesystem UUID, e.g.:
    #   path: guid(REPLACE-WITH-WINDOWS-ESP-UUID):/EFI/Microsoft/Boot/bootmgfw.efi
    # Find it with: blkid (look for the Windows ESP, usually FAT32, ~100-300MB)
